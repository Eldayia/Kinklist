services:
  kinklist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kinklist-app
    ports:
      - "${HOST_PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - SHARE_TTL_DAYS=${SHARE_TTL_DAYS:-0}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://kink.eldayia.fr}
      - STATS_TOKEN=${STATS_TOKEN:-}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:-FXdgkrJmkwv/tRcStXG+cCeBeWowbn+hLZD6j8zIVg4=}
      - TRUST_PROXY=${TRUST_PROXY:-false}
    volumes:
      - kinklist-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.kinklist.description=Application Kinklist avec API de liens courts"
      - "com.kinklist.version=3.5"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  kinklist-data:
    driver: local
